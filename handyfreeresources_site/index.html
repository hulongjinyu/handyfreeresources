<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GALLERY · 影相集</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- 顶部标题 -->
  <header class="header">
    <h1 class="header-title">影 相 集</h1>
    <p class="header-subtitle">A Cinematic Visual Collection</p>
    <div class="header-divider"></div>
  </header>

  <!-- 分类 Tab -->
  <div class="tabs-wrapper">
    <div class="tabs" id="tabs"></div>
  </div>

  <!-- 图片网格 -->
  <main class="gallery-container">
    <div class="grid" id="grid"></div>
  </main>

  <!-- 页脚 -->
  <footer class="footer">
    GALLERY · PHOTO COLLECTION · 47 IMAGES
  </footer>

  <!-- 灯箱（点击图片弹出） -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-btn" id="lightbox-close">×</button>
    <button class="lightbox-btn" id="lightbox-prev">‹</button>
    <button class="lightbox-btn" id="lightbox-next">›</button>
    <div class="lightbox-content">
      <img id="lightbox-img" src="" alt="" />
      <div class="lightbox-caption">
        <div id="lightbox-title"></div>
        <div id="lightbox-counter"></div>
      </div>
    </div>
  </div>

  <script src="js/gallery.js"></script>
</body>
</html>
